    <style>
        .form-container { max-width: 600px; margin: 2rem auto; background: var(--card-bg); padding: 2.5rem; border-radius: 15px; box-shadow: var(--shadow); border-top: 5px solid var(--gold); }
        .form-header { text-align: center; margin-bottom: 2rem; }
        .form-header h2 { color: var(--dark-green); font-size: 1.8rem; margin-bottom: 0.5rem; }
        body.dark-mode .form-header h2 { color: var(--gold); }
        .form-header p { color: var(--text-sec); font-size: 0.9rem; }
        .form-section { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--light-green); }
        .form-section-title { color: var(--med-green); font-size: 1.2rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        body.dark-mode .form-section-title { color: var(--light-gold); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-main); font-size: 0.95rem; }
        .form-group label .required { color: #e74c3c; margin-right: 3px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 15px; border: 2px solid var(--light-green); border-radius: 8px; background: var(--bg-color); color: var(--text-main); font-size: 1rem; font-family: inherit; transition: all 0.3s ease; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 4px rgba(201, 162, 74, 0.15); transform: translateY(-2px); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-primary { flex: 2; padding: 14px; background: linear-gradient(135deg, var(--med-green), var(--dark-green)); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15, 76, 76, 0.3); }
        .btn-secondary { flex: 1; padding: 14px; background: transparent; color: var(--text-main); border: 2px solid var(--light-green); border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        .btn-secondary:hover { background: var(--light-green); color: white; transform: translateY(-2px); }
        .success-message { display: none; background: linear-gradient(135deg, var(--light-green), var(--med-green)); color: white; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

</head>

            const langs = [
                {code: 'ar', name: 'العربية', flag: '🇸🇦'}, {code: 'en', name: 'English', flag: '🇬🇧'},
                {code: 'tr', name: 'Türkçe', flag: '🇹🇷'}, {code: 'es', name: 'Español', flag: '🇪🇸'},
                {code: 'ko', name: '한국어', flag: '🇰🇷'}, {code: 'ja', name: '日本語', flag: '🇯🇵'},
                {code: 'hi', name: 'हिन्दी', flag: '🇮🇳'}, {code: 'fil', name: 'Filipino', flag: '🇵🇭'},
                {code: 'zh', name: '中文', flag: '🇨🇳'}
            ];

            const existingMenu = document.querySelector('.lang-menu');
            if (existingMenu) { existingMenu.remove(); return; }

            const menu = document.createElement('div');
            menu.className = 'lang-menu';
            menu.style.cssText = 'position: absolute; top: 100%; right: 0; background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); padding: 10px; min-width: 180px; z-index: 10000; margin-top: 5px; border: 2px solid #1F6F6F;';

            langs.forEach(l => {
                const btn = document.createElement('button');
                btn.textContent = l.flag + '  ' + l.name;
                btn.style.cssText = 'width: 100%; padding: 10px 15px; margin: 3px 0; border: none; background: transparent; border-radius: 5px; cursor: pointer; text-align: right; font-family: Tajawal, sans-serif; font-size: 14px; transition: all 0.2s;';
                btn.onmouseover = () => { btn.style.background = '#1F6F6F'; btn.style.color = 'white'; };
                btn.onmouseout = () => { btn.style.background = 'transparent'; };
                btn.onclick = () => {
                    currentLang = l.code;
                    localStorage.setItem('sama-lang', currentLang);
                    document.getElementById('lang-btn').textContent = l.flag;
                    menu.remove();
                    applyTranslation(currentLang);
                };
                menu.appendChild(btn);
            });

            this.parentElement.style.position = 'relative';
            this.parentElement.appendChild(menu);
        });

        // الوضع الليلي
        document.getElementById('theme-toggle').addEventListener('click', function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('sama-theme', next);
            this.querySelector('i').className = next === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        });

        // تطبيق الترجمة عند التحميل        setTimeout(() => {
            const savedLang = localStorage.getItem('sama-lang') || 'ar';
            currentLang = savedLang;
            document.getElementById('lang-btn').textContent = flags[savedLang] || '🇸🇦';
            applyTranslation(savedLang);
        }, 100);

        // نموذج الطالب
        const form = document.getElementById('new-student-form');
        const successMsg = document.getElementById('success-msg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!form.checkValidity()) { e.stopPropagation(); form.reportValidity(); return; }

            const studentData = {
                studentName: document.getElementById('student-name').value.trim(),
                studentId: document.getElementById('student-id').value.trim(),
                gradeLevel: document.getElementById('grade-level').value,
                classRoom: document.getElementById('class-room').value.trim(),
                parentName: document.getElementById('parent-name').value.trim(),
                parentPhone: document.getElementById('parent-phone').value.trim(),
                parentEmail: document.getElementById('parent-email').value.trim(),
                notes: document.getElementById('notes').value.trim(),
                createdAt: new Date().toISOString()
            };

            let students = JSON.parse(localStorage.getItem('students') || '[]');
            students.push(studentData);
            localStorage.setItem('students', JSON.stringify(students));

            successMsg.style.display = 'block';
            setTimeout(() => { successMsg.style.display = 'none'; window.location.href = 'students.html'; }, 2000);
            form.reset();
        });

        ['parent-phone', 'student-id'].forEach(id => {
            document.getElementById(id).addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 10) value = value.slice(0, 10);
                e.target.value = value;
            });
        });
    </script>
</body>
</html>
