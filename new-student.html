<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="ns-page-title">سما | إنشاء سجل طالب جديد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            border-top: 5px solid var(--gold);
        }
        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-header h2 {
            color: var(--dark-green);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        body.dark-mode .form-header h2 {
            color: var(--gold);
        }
        .form-header p {
            color: var(--text-sec);
            font-size: 0.9rem;
        }
        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--light-green);
        }
        .form-section-title {
            color: var(--med-green);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        body.dark-mode .form-section-title {
            color: var(--light-gold);
        }        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--text-main);
            font-size: 0.95rem;
        }
        .form-group label .required {
            color: #e74c3c;
            margin-right: 3px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light-green);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201, 162, 74, 0.15);
            transform: translateY(-2px);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .btn-group {            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn-primary {
            flex: 2;
            padding: 14px;
            background: linear-gradient(135deg, var(--med-green), var(--dark-green));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 76, 76, 0.3);
        }
        .btn-secondary {
            flex: 1;
            padding: 14px;
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--light-green);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: var(--light-green);
            color: white;
            transform: translateY(-2px);
        }
        .success-message {
            display: none;
            background: linear-gradient(135deg, var(--light-green), var(--med-green));
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            animation: slideIn 0.3s ease;        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header class="main-header">
        <div class="logo-container">
            <div class="logo-circle">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="titles">
                <h1 class="site-name" id="ns-site-name">سما</h1>
                <p class="site-subtitle" id="ns-site-subtitle">إنشاء سجل طالب جديد</p>
            </div>
        </div>
        <div class="controls">
            <button id="theme-toggle" class="control-btn" title="تبديل الوضع">
                <i class="fas fa-moon"></i>
            </button>
            <a href="index.html" class="control-btn" style="text-decoration: none; display: inline-flex; align-items: center;">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </header>

    <!-- محتوى الصفحة -->
    <main class="main-content">
        <div class="form-container">
            <div class="form-header">
                <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--gold); margin-bottom: 1rem;"></i>
                <h2 id="ns-form-title">بيانات الطالب الجديد</h2>
                <p id="ns-form-desc">يرجى تعبئة جميع الحقول المطلوبة بدقة</p>
            </div>

            <div id="ns-success-msg" class="success-message">
                <i class="fas fa-check-circle"></i> <span id="ns-success-text">تم حفظ البيانات بنجاح!</span>
            </div>

            <form id="new-student-form" novalidate>
                <!-- قسم بيانات الطالب -->
                <div class="form-section">
                    <h3 class="form-section-title" id="ns-section-student">
                        <i class="fas fa-user-graduate"></i>
                        <span id="ns-title-student">بيانات الطالب</span>
                    </h3>                    
                    <div class="form-group">
                        <label for="student-name">
                            <span id="ns-label-student-name">اسم الطالب الرباعي</span> <span class="required">*</span>
                        </label>
                        <input type="text" id="student-name" name="student-name" 
                            data-ph="ns-ph-student-name" placeholder="مثال: أحمد محمد علي عبدالله" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="student-id">
                                <span id="ns-label-student-id">رقم الهوية / الإقامة</span> <span class="required">*</span>
                            </label>
                            <input type="text" id="student-id" name="student-id" 
                                data-ph="ns-ph-student-id" placeholder="1xxxxxxxxx" required>
                        </div>
                        <div class="form-group">
                            <label for="grade-level">
                                <span id="ns-label-grade">المرحلة الدراسية</span> <span class="required">*</span>
                            </label>
                            <select id="grade-level" name="grade-level" required>
                                <option value="" disabled selected id="ns-opt-select">اختر المرحلة...</option>
                                <option value="primary" id="ns-opt-primary">ابتدائي</option>
                                <option value="middle" id="ns-opt-middle">متوسط</option>
                                <option value="high" id="ns-opt-high">ثانوي</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="class-room">
                            <span id="ns-label-class">الصف والفصل</span> <span class="required">*</span>
                        </label>
                        <input type="text" id="class-room" name="class-room" 
                            data-ph="ns-ph-class" placeholder="مثال: الثالث أ" required>
                    </div>
                </div>

                <!-- قسم بيانات ولي الأمر -->
                <div class="form-section">
                    <h3 class="form-section-title" id="ns-section-parent">
                        <i class="fas fa-user-shield"></i>
                        <span id="ns-title-parent">بيانات ولي الأمر</span>
                    </h3>
                    
                    <div class="form-group">
                        <label for="parent-name">
                            <span id="ns-label-parent-name">اسم ولي الأمر الرباعي</span> <span class="required">*</span>
                        </label>                        <input type="text" id="parent-name" name="parent-name" 
                            data-ph="ns-ph-parent-name" placeholder="الاسم الرباعي لولي الأمر" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="parent-phone">
                                <span id="ns-label-phone">رقم الجوال</span> <span class="required">*</span>
                            </label>
                            <input type="tel" id="parent-phone" name="parent-phone" 
                                data-ph="ns-ph-phone" placeholder="05xxxxxxxx" required>
                        </div>
                        <div class="form-group">
                            <label for="parent-email">
                                <span id="ns-label-email">البريد الإلكتروني</span>
                            </label>
                            <input type="email" id="parent-email" name="parent-email" 
                                data-ph="ns-ph-email" placeholder="example@email.com">
                        </div>
                    </div>
                </div>

                <!-- ملاحظات إضافية -->
                <div class="form-section" style="border-bottom: none;">
                    <h3 class="form-section-title" id="ns-section-notes">
                        <i class="fas fa-sticky-note"></i>
                        <span id="ns-title-notes">معلومات إضافية</span>
                    </h3>
                    <div class="form-group">
                        <label for="notes"><span id="ns-label-notes">ملاحظات</span></label>
                        <textarea id="notes" name="notes" data-ph="ns-ph-notes" 
                            placeholder="أي معلومات إضافية عن الطالب (حالة صحية، ظروف خاصة، إلخ...)"></textarea>
                    </div>
                </div>

                <!-- أزرار التحكم -->
                <div class="btn-group">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i>
                        <span id="ns-btn-save">حفظ السجل</span>
                    </button>
                    <button type="reset" class="btn-secondary">
                        <i class="fas fa-undo"></i>
                        <span id="ns-btn-reset">إعادة تعيين</span>
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
    <script>
        // ========== التحقق من صحة النموذج ==========
        const form = document.getElementById('new-student-form');
        const successMsg = document.getElementById('ns-success-msg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.reportValidity();
                return;
            }

            const studentData = {
                studentName: document.getElementById('student-name').value.trim(),
                studentId: document.getElementById('student-id').value.trim(),
                gradeLevel: document.getElementById('grade-level').value,
                classRoom: document.getElementById('class-room').value.trim(),
                parentName: document.getElementById('parent-name').value.trim(),
                parentPhone: document.getElementById('parent-phone').value.trim(),
                parentEmail: document.getElementById('parent-email').value.trim(),
                notes: document.getElementById('notes').value.trim(),
                createdAt: new Date().toISOString(),
                createdDate: new Date().toLocaleDateString('ar-SA')
            };

            console.log('=== بيانات الطالب الجديد ===');
            console.log(studentData);

            let students = JSON.parse(localStorage.getItem('students') || '[]');
            students.push(studentData);
            localStorage.setItem('students', JSON.stringify(students));

            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
                window.location.href = 'students.html';
            }, 2000);
            form.reset();
        });

        // تنسيق الأرقام
        ['parent-phone', 'student-id'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 10) value = value.slice(0, 10);
                e.target.value = value;
            });
        });    </script>
</body>
</html>
