<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء طالب جديد | سما</title>
    <link rel="icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 5px 20px var(--shadow);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-dark);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-mid);
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary-mid), var(--primary-dark));
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow);
        }
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <a href="index.html" class="control-btn" style="background:transparent;border:none;color:white;">
                <i class="fas fa-home"></i>
            </a>
        </div>
        <div class="controls">
            <button id="theme-toggle" class="control-btn">
                <i class="fas fa-moon"></i>
            </button>
            <button id="lang-toggle" class="control-btn">🇸</button>
            <button id="account-btn" class="control-btn">
                <i class="fas fa-user-cog"></i>
            </button>
        </div>
    </header>

    <main class="form-container">
        <div class="form-header" style="text-align:center;margin-bottom:2rem;">
            <i class="fas fa-user-plus" style="font-size:3rem;color:var(--gold);margin-bottom:1rem;"></i>
            <h1 id="form-title">بيانات الطالب الجديد</h1>
            <p id="form-desc">يرجى تعبئة جميع الحقول المطلوبة بدقة</p>
        </div>

        <form id="student-form">
            <div class="form-group">
                <label>
                    <span id="lbl-name">اسم الطالب الرباعي</span>
                    <span class="required">*</span>
                </label>
                <input type="text" id="student-name" required placeholder="مثال: أحمد محمد علي عبدالله">
            </div>

            <div class="form-group">
                <label>
                    <span id="lbl-id">رقم الهوية / الإقامة</span>
                    <span class="required">*</span>
                </label>
                <input type="text" id="student-id" required placeholder="1xxxxxxxxx">
            </div>

            <div class="form-group">
                <label>
                    <span id="lbl-grade">الصف والفصل</span>
                    <span class="required">*</span>
                </label>
                <input type="text" id="student-grade" required placeholder="مثال: الثالث أ">
            </div>

            <div class="form-group">
                <label>
                    <span id="lbl-parent">اسم ولي الأمر</span>
                    <span class="required">*</span>
                </label>
                <input type="text" id="parent-name" required>
            </div>

            <div class="form-group">
                <label>
                    <span id="lbl-phone">رقم جوال ولي الأمر</span>
                    <span class="required">*</span>
                </label>
                <input type="tel" id="parent-phone" required placeholder="05xxxxxxxx">
            </div>

            <div class="form-group">
                <label>
                    <span id="lbl-email">البريد الإلكتروني</span>
                </label>
                <input type="email" id="parent-email" placeholder="example@email.com">
            </div>

            <button type="submit" class="btn-submit" id="btn-save">حفظ البيانات</button>
        </form>
    </main>

    <footer class="main-footer">
        <p id="footer-text">© 2026 سما - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        // ========== الوضع الليلي واللغة ==========
        window.addEventListener('load', () => {
            // الوضع الليلي
            const themeBtn = document.getElementById('theme-toggle');
            if (themeBtn) {
                const savedTheme = localStorage.getItem('sama-theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                
                themeBtn.addEventListener('click', function() {
                    const current = document.documentElement.getAttribute('data-theme');
                    const next = current === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('sama-theme', next);
                    
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.className = next === 'light' ? 'fas fa-moon' : 'fas fa-sun';
                    }
                });
            }
            
            // اللغة
            const langBtn = document.getElementById('lang-toggle');
            let currentLang = localStorage.getItem('sama-lang') || 'ar';
            
            const translations = {
                ar: {
                    formTitle: 'بيانات الطالب الجديد',
                    formDesc: 'يرجى تعبئة جميع الحقول المطلوبة بدقة',
                    lblName: 'اسم الطالب الرباعي',
                    lblId: 'رقم الهوية / الإقامة',
                    lblGrade: 'الصف والفصل',
                    lblParent: 'اسم ولي الأمر',
                    lblPhone: 'رقم جوال ولي الأمر',
                    lblEmail: 'البريد الإلكتروني',
                    btnSave: 'حفظ البيانات',
                    footer: '© 2026 سما - جميع الحقوق محفوظة',
                    placeholderName: 'مثال: أحمد محمد علي عبدالله',
                    placeholderGrade: 'مثال: الثالث أ',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'example@email.com'
                },
                en: {
                    formTitle: 'New Student Data',
                    formDesc: 'Please fill in all required fields accurately',
                    lblName: 'Student Full Name',
                    lblId: 'ID / Residence Number',
                    lblGrade: 'Grade & Class',
                    lblParent: 'Parent Name',
                    lblPhone: 'Parent Phone Number',
                    lblEmail: 'Email Address',
                    btnSave: 'Save Data',
                    footer: '© 2026 Sama - All Rights Reserved',
                    placeholderName: 'Example: Ahmed Mohammed Ali',
                    placeholderGrade: 'Example: Grade 3A',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'example@email.com'
                },
                tr: {
                    formTitle: 'Yeni Öğrenci Bilgileri',
                    formDesc: 'Lütfen tüm gerekli alanları eksiksiz doldurun',
                    lblName: 'Öğrencinin Tam Adı',
                    lblId: 'Kimlik / İkamet Numarası',
                    lblGrade: 'Sınıf ve Şube',
                    lblParent: 'Veli Adı',
                    lblPhone: 'Veli Telefon Numarası',
                    lblEmail: 'E-posta Adresi',
                    btnSave: 'Bilgileri Kaydet',
                    footer: '© 2026 Sama - Tüm Hakları Saklıdır',
                    placeholderName: 'Örnek: Ahmet Mehmet Ali',
                    placeholderGrade: 'Örnek: 3-A Sınıfı',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'ornek@email.com'
                },
                es: {
                    formTitle: 'Datos del Nuevo Estudiante',
                    formDesc: 'Por favor completa todos los campos requeridos',
                    lblName: 'Nombre Completo del Estudiante',
                    lblId: 'Número de Identificación',
                    lblGrade: 'Grado y Clase',
                    lblParent: 'Nombre del Padre/Tutor',
                    lblPhone: 'Teléfono del Padre/Tutor',
                    lblEmail: 'Correo Electrónico',
                    btnSave: 'Guardar Datos',
                    footer: '© 2026 Sama - Todos los Derechos Reservados',
                    placeholderName: 'Ejemplo: Ahmed Mohammed Ali',
                    placeholderGrade: 'Ejemplo: 3ro A',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'ejemplo@email.com'
                },
                ko: {
                    formTitle: '새 학생 정보',
                    formDesc: '모든 필수 필드를 정확히 입력하세요',
                    lblName: '학생 전체 이름',
                    lblId: '주민등록번호 / 거주번호',
                    lblGrade: '학년 및 반',
                    lblParent: '학부모 성명',
                    lblPhone: '학부모 전화번호',
                    lblEmail: '이메일 주소',
                    btnSave: '정보 저장',
                    footer: '© 2026 Sama - 모든 권리 보유',
                    placeholderName: '예: Ahmed Mohammed Ali',
                    placeholderGrade: '예: 3학년 A반',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'example@email.com'
                },
                ja: {
                    formTitle: '新しい生徒の情報',
                    formDesc: 'すべての必須項目を正確に入力してください',
                    lblName: '生徒のフルネーム',
                    lblId: 'ID番号 / 居住番号',
                    lblGrade: '学年とクラス',
                    lblParent: '保護者名',
                    lblPhone: '保護者電話番号',
                    lblEmail: 'メールアドレス',
                    btnSave: '情報を保存',
                    footer: '© 2026 Sama - 全著作権所有',
                    placeholderName: '例：Ahmed Mohammed Ali',
                    placeholderGrade: '例：3年生A組',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'example@email.com'
                },
                hi: {
                    formTitle: 'नए छात्र का डेटा',
                    formDesc: 'कृपया सभी आवश्यक फ़ील्ड भरें',
                    lblName: 'छात्र का पूरा नाम',
                    lblId: 'पहचान संख्या / निवास संख्या',
                    lblGrade: 'कक्षा और सेक्शन',
                    lblParent: 'अभिभावक का नाम',
                    lblPhone: 'अभिभावक का फोन नंबर',
                    lblEmail: 'ईमेल पता',
                    btnSave: 'डेटा सहेजें',
                    footer: '© 2026 Sama - सभी अधिकार सुरक्षित',
                    placeholderName: 'उदाहरण: Ahmed Mohammed Ali',
                    placeholderGrade: 'उदाहरण: कक्षा 3 A',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'example@email.com'
                },
                fil: {
                    formTitle: 'Data ng Bagong Mag-aaral',
                    formDesc: 'Punan ang lahat ng required na fields',
                    lblName: 'Buong Pangalan ng Mag-aaral',
                    lblId: 'ID / Residence Number',
                    lblGrade: 'Baitang at Seksyon',
                    lblParent: 'Pangalan ng Magulang',
                    lblPhone: 'Numero ng Magulang',
                    lblEmail: 'Email Address',
                    btnSave: 'I-save ang Data',
                    footer: '© 2026 Sama - Lahat ng Karapatan ay Nakalaan',
                    placeholderName: 'Halimbawa: Ahmed Mohammed Ali',
                    placeholderGrade: 'Halimbawa: Baitang 3A',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'example@email.com'
                },
                zh: {
                    formTitle: '新学生信息',
                    formDesc: '请准确填写所有必填字段',
                    lblName: '学生全名',
                    lblId: '身份证号 / 居住证号',
                    lblGrade: '年级和班级',
                    lblParent: '家长姓名',
                    lblPhone: '家长电话号码',
                    lblEmail: '电子邮件地址',
                    btnSave: '保存信息',
                    footer: '© 2026 Sama - 版权所有',
                    placeholderName: '示例：Ahmed Mohammed Ali',
                    placeholderGrade: '示例：三年级A班',
                    placeholderPhone: '05xxxxxxxx',
                    placeholderEmail: 'example@email.com'
                }
            };
            
            const flags = {
                ar: '🇸🇦', en: '🇬🇧', tr: '🇹🇷', es: '🇪🇸',
                ko: '🇰🇷', ja: '🇯🇵', hi: '🇮🇳', fil: '🇵🇭', zh: '🇨🇳'
            };
            
            function translatePage(lang) {
                const t = translations[lang];
                if (!t) return;
                
                const elements = {
                    'form-title': t.formTitle,
                    'form-desc': t.formDesc,
                    'lbl-name': t.lblName,
                    'lbl-id': t.lblId,
                    'lbl-grade': t.lblGrade,
                    'lbl-parent': t.lblParent,
                    'lbl-phone': t.lblPhone,
                    'lbl-email': t.lblEmail,
                    'btn-save': t.btnSave,
                    'footer-text': t.footer
                };
                
                for (const [id, text] of Object.entries(elements)) {
                    const el = document.getElementById(id);
                    if (el) el.textContent = text;
                }
                
                // Placeholders
                const nameInput = document.getElementById('student-name');
                if (nameInput) nameInput.placeholder = t.placeholderName;
                
                const gradeInput = document.getElementById('student-grade');
                if (gradeInput) gradeInput.placeholder = t.placeholderGrade;
                
                const phoneInput = document.getElementById('parent-phone');
                if (phoneInput) phoneInput.placeholder = t.placeholderPhone;
                
                const emailInput = document.getElementById('parent-email');
                if (emailInput) emailInput.placeholder = t.placeholderEmail;
                
                document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
                document.documentElement.lang = lang;
            }
            
            if (langBtn) {
                langBtn.textContent = flags[currentLang] || '🇸🇦';
                langBtn.style.cursor = 'pointer';
                
                setTimeout(() => translatePage(currentLang), 200);
                
                langBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const langs = [
                        {code: 'ar', name: 'العربية', flag: '🇸🇦'},
                        {code: 'en', name: 'English', flag: '🇬🇧'},
                        {code: 'tr', name: 'Türkçe', flag: '🇹🇷'},
                        {code: 'es', name: 'Español', flag: '🇪'},
                        {code: 'ko', name: '한국어', flag: '🇰'},
                        {code: 'ja', name: '日本語', flag: '🇯'},
                        {code: 'hi', name: 'हिन्दी', flag: '🇮🇳'},
                        {code: 'fil', name: 'Filipino', flag: '🇵🇭'},
                        {code: 'zh', name: '中文', flag: '🇨🇳'}
                    ];
                    
                    const oldMenu = document.querySelector('.lang-menu');
                    if (oldMenu) oldMenu.remove();
                    
                    const menu = document.createElement('div');
                    menu.className = 'lang-menu';
                    menu.style.cssText = 'position:absolute;top:100%;right:0;background:white;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.3);padding:10px;min-width:180px;z-index:9999;margin-top:5px;border:2px solid #1F6F6F;';
                    
                    langs.forEach(l => {
                        const btn = document.createElement('button');
                        btn.textContent = l.flag + '  ' + l.name;
                        btn.style.cssText = 'width:100%;padding:10px 15px;margin:3px 0;border:none;background:transparent;border-radius:5px;cursor:pointer;text-align:right;font-family:Tajawal,sans-serif;font-size:14px;transition:all 0.2s;';
                        
                        btn.onmouseover = () => {
                            btn.style.background = '#1F6F6F';
                            btn.style.color = 'white';
                        };
                        btn.onmouseout = () => {
                            btn.style.background = 'transparent';
                            btn.style.color = 'inherit';
                        };
                        
                        btn.onclick = function(ev) {
                            ev.preventDefault();
                            ev.stopPropagation();
                            currentLang = l.code;
                            localStorage.setItem('sama-lang', currentLang);
                            langBtn.textContent = l.flag;
                            menu.remove();
                            translatePage(currentLang);
                        };
                        
                        menu.appendChild(btn);
                    });
                    
                    this.parentElement.style.position = 'relative';
                    this.parentElement.appendChild(menu);
                });
            }
            
            // حفظ البيانات
            const form = document.getElementById('student-form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const studentData = {
                        name: document.getElementById('student-name').value,
                        id: document.getElementById('student-id').value,
                        grade: document.getElementById('student-grade').value,
                        parentName: document.getElementById('parent-name').value,
                        parentPhone: document.getElementById('parent-phone').value,
                        parentEmail: document.getElementById('parent-email').value,
                        date: new Date().toISOString()
                    };
                    
                    // حفظ في localStorage
                    let students = JSON.parse(localStorage.getItem('sama-students') || '[]');
                    students.push(studentData);
                    localStorage.setItem('sama-students', JSON.stringify(students));
                    
                    alert('✅ تم حفظ بيانات الطالب بنجاح!');
                    form.reset();
                });
            }
        });
    </script>
</body>
</html>
