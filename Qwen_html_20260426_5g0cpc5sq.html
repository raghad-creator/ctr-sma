<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سما | سجل متابعة الطالب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <h1 class="site-title">سما</h1>
            <p class="site-subtitle">سجل متابعة الطالب</p>
        </div>
        <div class="controls">
            <button id="theme-toggle" class="control-btn" aria-label="تبديل الوضع الليلي/النهاري">
                <i class="fas fa-moon"></i>
            </button>
            <button id="lang-toggle" class="control-btn" aria-label="تغيير اللغة">
                EN
            </button>
            <button id="account-btn" class="control-btn" aria-label="إدارة الحساب">
                <i class="fas fa-user-cog"></i>
            </button>
        </div>
    </header>

    <main class="welcome-container">
        <div class="welcome-box">
            <h2 id="teacher-greeting">أهلاً، معلمة...</h2>
            <p class="question">ماذا تريد أن تفعل اليوم؟</p>
            <div class="options-grid">
                <a href="new-student.html" class="option-card">
                    <i class="fas fa-user-plus"></i>
                    <span>إنشاء سجل لطالب جديد</span>
                </a>
                <a href="students.html" class="option-card">
                    <i class="fas fa-clipboard-list"></i>
                    <span>متابعة سجل طلابي</span>
                </a>
                <a href="parents.html" class="option-card">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>رفع لأولياء الأمور</span>
                </a>
                <a href="help.html" class="option-card">
                    <i class="fas fa-headset"></i>
                    <span>المساعدة والدعم</span>
                </a>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>© 2026 سما - جميع الحقوق محفوظة | تطوير خاص للمعلمات</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
