<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="pageTitleMain">سما | سجل متابعة الطالب</title>
    <meta name="description" content="سما - نظام إلكتروني منظم لمتابعة سجلات الطلاب">
    
    <!-- أيقونة الموقع -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ملف التنسيقات -->
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="Main">
    <!-- الهيدر الرئيسي -->
    <header class="main-header">
        <div class="logo-container">
            <img src="logo.png" alt="شعار سما" class="site-logo" data-translate="siteLogoAlt">
        </div>
        
        <div class="controls">
            <button id="theme-toggle" class="control-btn" data-translate="toggleTheme" aria-label="تبديل الوضع الليلي/النهاري">
                <i class="fas fa-moon"></i>
            </button>
            <button id="lang-toggle" class="control-btn" data-translate="toggleLang" aria-label="تغيير اللغة">
                🇸🇦
            </button>
            <button id="account-btn" class="control-btn" data-translate="manageAccount" aria-label="إدارة الحساب">
                <i class="fas fa-user-cog"></i>
            </button>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="welcome-container">
        <div class="welcome-box">
            <h2 id="teacher-greeting" data-translate="greeting">أهلاً، معلمة...</h2>
            <p class="question" data-translate="question">ماذا تريد أن تفعل اليوم؟</p>
            
            <div class="options-grid">
                <a href="new-student.html" class="option-card">
                    <i class="fas fa-user-plus"></i>
                    <span data-translate="newStudent">إنشاء سجل لطالب جديد</span>
                </a>
                <a href="students.html" class="option-card">
                    <i class="fas fa-clipboard-list"></i>
                    <span data-translate="followStudents">متابعة سجل طلابي</span>
                </a>
                <a href="parents.html" class="option-card">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span data-translate="uploadParents">رفع لأولياء الأمور</span>
                </a>
                <a href="help.html" class="option-card">
                    <i class="fas fa-headset"></i>
                    <span data-translate="helpSupport">المساعدة والدعم</span>
                </a>
            </div>
        </div>
    </main>

    <!-- الفوتر -->
    <footer class="main-footer">
        <p data-translate="footer">© 2026 سما - جميع الحقوق محفوظة | تطوير خاص للمعلمات</p>
    </footer>

    <!-- ملفات الجافاسكربت (الترتيب مهم!) -->
    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
