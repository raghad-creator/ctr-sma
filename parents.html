    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .parents-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .page-header h2 {
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.8rem;
        }
        
        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .search-bar input,
        .search-bar select {
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color, #e0e0e0);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--card-bg, #fff);
            color: var(--text, #333);
            font-family: 'Tajawal', sans-serif;
        }
        
        .search-bar input {
            flex: 1;
            min-width: 250px;
        }
        
        .search-bar select {
            min-width: 180px;
        }
        
        .parents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .parent-card {
            background: var(--card-bg, #fff);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 12px var(--shadow);
            border-top: 4px solid var(--primary-mid, #1F6F6F);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .parent-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow);
        }
        
        .parent-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color, #e0e0e0);
        }
        
        .parent-avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.5rem;
        }
        
        .parent-info h4 {
            margin: 0 0 0.25rem 0;
            color: var(--primary-dark);
            font-size: 1.2rem;
        }
        
        .linked-student {
            margin: 0;
            color: var(--text-light, #666);
            font-size: 0.9rem;
        }
        
        .linked-student span {
            color: var(--primary-mid);
            font-weight: 600;
        }
        
        .parent-contact {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            font-size: 0.95rem;
        }
        
        .parent-contact span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text, #333);
        }
        
        .parent-contact i {
            color: var(--primary-mid);
            width: 20px;
        }
        
        .parent-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-mid), var(--primary-dark));
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }
        
        .btn-secondary {
            background: var(--primary-light);
            color: #fff;
            flex: 1;
        }
        
        .btn-warning {
            background: var(--gold);
            color: #fff;
            flex: 1;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: #fff;
            flex: 1;
        }
        
        .btn-sm {
            padding: 0.5rem 0.9rem;
            font-size: 0.85rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            grid-column: 1 / -1;
        }
        
        .empty-state i {
            font-size: 5rem;
            color: var(--primary-light);
            opacity: 0.3;
            margin-bottom: 1.5rem;
        }
        
        .empty-state p {
            font-size: 1.2rem;
            color: var(--text-light, #666);
            margin-bottom: 1.5rem;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: var(--card-bg, #fff);
            padding: 2.5rem;
            border-radius: 16px;
            width: 90%;
            max-width: 550px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .close-modal {
            position: absolute;
            top: 1.25rem;
            left: 1.25rem;
            font-size: 1.75rem;
            cursor: pointer;
            color: var(--text-light, #666);
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .close-modal:hover {
            background: var(--bg, #f5f5f5);
            color: var(--primary-dark);
        }
        
        .modal-content h3 {
            margin: 0 0 1.5rem 0;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.85rem;
            border: 2px solid var(--border-color, #e0e0e0);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg, #fff);
            color: var(--text, #333);
            font-family: 'Tajawal', sans-serif;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-mid);
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .form-actions .btn {
            flex: 1;
            padding: 0.9rem;
            font-size: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="logo-container">
            <img src="logo.png" alt="شعار سما" class="site-logo">
        </div>
        <div class="controls">
            <button id="theme-toggle" class="control-btn">
                <i class="fas fa-moon"></i>
            </button>
            <button id="lang-toggle" class="control-btn" style="font-size: 20px;">🇸🇦</button>
            <a href="index.html" class="control-btn">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="parents-container">
        <div class="page-header">
            <h2>
                <i class="fas fa-user-tie"></i>
                <span id="txt-manage-parents">إدارة أولياء الأمور</span>
            </h2>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="fas fa-plus"></i>
                <span id="txt-add-parent">إضافة ولي أمر جديد</span>
            </button>
        </div>

        <!-- Search & Filter -->
        <div class="search-bar">
            <input type="text" id="parentSearch" placeholder="🔍 بحث باسم ولي الأمر أو الطالب..." onkeyup="filterParents()">
            <select id="filterClass" onchange="filterParents()">
                <option value="" id="txt-all-classes">جميع الصفوف</option>
            </select>
        </div>

        <!-- Parents List -->
        <div class="parents-grid" id="parentsList"></div>
    </main>

    <!-- Add/Edit Parent Modal -->
    <div id="parentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">
                <i class="fas fa-user-plus"></i>
                <span id="txt-new-parent">إضافة ولي أمر جديد</span>
            </h3>
            <form id="parentForm">
                <input type="hidden" id="parentId">
                <div class="form-group">
                    <label id="lbl-parent-name">اسم ولي الأمر الكامل</label>
                    <input type="text" id="parentName" required>
                </div>
                <div class="form-group">
                    <label id="lbl-phone">رقم الهاتف</label>
                    <input type="tel" id="parentPhone" required>
                </div>
                <div class="form-group">
                    <label id="lbl-email">البريد الإلكتروني (اختياري)</label>
                    <input type="email" id="parentEmail">
                </div>
                <div class="form-group">
                    <label id="lbl-link-student">ربط بالطالب</label>
                    <select id="linkStudent" required>
                        <option value="" id="txt-select-student">اختر الطالب المراد ربطه...</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>
                        <span id="txt-save">حفظ البيانات</span>
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">
                        <span id="txt-cancel">إلغاء</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="main-footer">
        <p id="txt-footer">© 2026 سما - جميع الحقوق محفوظة</p>
    </footer>

                lblLinkStudent: '与学生关联',
                selectStudent: '选择要关联的学生...',
                save: '保存信息',
                cancel: '取消',
                footer: '© 2026 Sama - 版权所有',
                noParents: '暂无已注册的家长',
                addFirstParent: '添加第一位家长',
                linkedStudent: '关联的学生',
                unspecified: '未指定',
                viewRecord: '查看记录',
                edit: '编辑',
                delete: '删除',
                confirmDelete: '您确定要删除这位家长吗？',
                noStudentLinked: '⚠️ 这位家长尚未与任何学生关联',
                placeholderName: '示例：Ahmed Mohammed Ali',
                placeholderPhone: '05xxxxxxxx',
                placeholderEmail: 'example@email.com'
            }
        };
        
        const flags = {
            ar: '🇸🇦', en: '🇬🇧', tr: '🇹🇷', es: '🇪🇸',
            ko: '🇰🇷', ja: '🇯🇵', hi: '🇮🇳', fil: '🇵🇭', zh: '🇨🇳'
        };
        
        function applyTranslation(lang) {
            const t = translations[lang];
            if (!t) return;
            
            const elements = {
                'txt-manage-parents': t.manageParents,
                'txt-add-parent': t.addParent,
                'txt-all-classes': t.allClasses,
                'txt-new-parent': t.newParent,
                'lbl-parent-name': t.lblParentName,
                'lbl-phone': t.lblPhone,
                'lbl-email': t.lblEmail,
                'lbl-link-student': t.lblLinkStudent,
                'txt-select-student': t.selectStudent,
                'txt-save': t.save,
                'txt-cancel': t.cancel,
                'txt-footer': t.footer
            };
            
            for (const [id, text] of Object.entries(elements)) {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            }
            
            const searchInput = document.getElementById('parentSearch');
            if (searchInput) searchInput.placeholder = t.searchPlaceholder;
            
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
        }
        
        // زر اللغة
        const langBtn = document.getElementById('lang-toggle');
        if (langBtn) {
            langBtn.textContent = flags[currentLang] || '🇸🇦';
            
            langBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const langs = [
                    {code: 'ar', name: 'العربية', flag: '🇸'},
                    {code: 'en', name: 'English', flag: '🇬🇧'},
                    {code: 'tr', name: 'Türkçe', flag: '🇹'},
                    {code: 'es', name: 'Español', flag: '🇪🇸'},
                    {code: 'ko', name: '한국어', flag: '🇰🇷'},
                    {code: 'ja', name: '日本語', flag: '🇯'},
                    {code: 'hi', name: 'हिन्दी', flag: '🇮🇳'},
                    {code: 'fil', name: 'Filipino', flag: '🇵🇭'},
                    {code: 'zh', name: '中文', flag: '🇨'}
                ];
                
                const oldMenu = document.querySelector('.lang-menu');
                if (oldMenu) oldMenu.remove();
                
                const menu = document.createElement('div');
                menu.className = 'lang-menu';
                menu.style.cssText = 'position:absolute;top:100%;right:0;background:white;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.3);padding:10px;min-width:180px;z-index:9999;margin-top:5px;border:2px solid #1F6F6F;';
                
                langs.forEach(l => {
                    const btn = document.createElement('button');
                    btn.textContent = l.flag + '  ' + l.name;
                    btn.style.cssText = 'width:100%;padding:10px 15px;margin:3px 0;border:none;background:transparent;border-radius:5px;cursor:pointer;text-align:right;font-family:Tajawal,sans-serif;font-size:14px;transition:all 0.2s;';
                    
                    btn.onmouseover = () => {
                        btn.style.background = '#1F6F6F';
                        btn.style.color = 'white';
                    };
                    btn.onmouseout = () => {
                        btn.style.background = 'transparent';
                        btn.style.color = 'inherit';
                    };
                    
                    btn.onclick = function(ev) {
                        ev.preventDefault();
                        ev.stopPropagation();
                        currentLang = l.code;
                        localStorage.setItem('sama-lang', currentLang);
                        langBtn.textContent = l.flag;
                        menu.remove();
                        applyTranslation(currentLang);
                        loadParents();
                    };
                    
                    menu.appendChild(btn);
                });
                
                this.parentElement.style.position = 'relative';
                this.parentElement.appendChild(menu);
            });
            
            setTimeout(() => applyTranslation(currentLang), 200);
        }
        
        // ========== الوظائف الأصلية ==========
        
        document.addEventListener('DOMContentLoaded', () => {
            loadParents();
            populateStudentDropdown();
            populateClassFilter();
            initTheme();
        });
        
        function loadParents() {
            const parents = JSON.parse(localStorage.getItem('parents')) || [];
            const container = document.getElementById('parentsList');
            container.innerHTML = '';
            
            const t = translations[currentLang];
            
            if (parents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>${t.noParents}</p>
                        <button class="btn btn-primary" onclick="openModal()">
                            <i class="fas fa-plus"></i> ${t.addFirstParent}
                        </button>
                    </div>`;
                return;
            }
            
            parents.forEach(parent => {
                const card = document.createElement('div');
                card.className = 'parent-card';
                card.innerHTML = `
                    <div class="parent-header">
                        <div class="parent-avatar"><i class="fas fa-user-tie"></i></div>
                        <div class="parent-info">
                            <h4>${parent.name}</h4>
                            <p class="linked-student">${t.linkedStudent}: <span>${parent.studentName || t.unspecified}</span></p>
                        </div>
                    </div>
                    <div class="parent-contact">
                        <span><i class="fas fa-phone"></i> ${parent.phone}</span>
                        <span><i class="fas fa-envelope"></i> ${parent.email || '-'}</span>
                    </div>
                    <div class="parent-actions">
                        <button class="btn btn-sm btn-secondary" onclick="viewStudentRecord('${parent.studentId}')">
                            <i class="fas fa-eye"></i> ${t.viewRecord}
                        </button>
                        <button class="btn btn-sm btn-warning" onclick="editParent('${parent.id}')">
                            <i class="fas fa-edit"></i> ${t.edit}
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteParent('${parent.id}')">
                            <i class="fas fa-trash"></i> ${t.delete}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function populateStudentDropdown() {
            const students = JSON.parse(localStorage.getItem('students')) || [];
            const select = document.getElementById('linkStudent');
            const t = translations[currentLang];
            select.innerHTML = '<option value="">' + t.selectStudent + '</option>';
            students.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.name} - ${s.class || ''}</option>`;
            });
        }
        
        function populateClassFilter() {
            const students = JSON.parse(localStorage.getItem('students')) || [];
            const classes = [...new Set(students.map(s => s.class).filter(Boolean))];
            const select = document.getElementById('filterClass');
            const t = translations[currentLang];
            select.innerHTML = '<option value="">' + t.allClasses + '</option>';
            classes.forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }
        
        function openModal() {
            document.getElementById('parentModal').style.display = 'flex';
            document.getElementById('parentForm').reset();
            document.getElementById('parentId').value = '';
            const t = translations[currentLang];
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> <span>' + t.newParent + '</span>';
        }
        
        function closeModal() {
            document.getElementById('parentModal').style.display = 'none';
        }
        
        document.getElementById('parentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('parentId').value || Date.now().toString();
            const name = document.getElementById('parentName').value.trim();
            const phone = document.getElementById('parentPhone').value.trim();
            const email = document.getElementById('parentEmail').value.trim();
            const studentId = document.getElementById('linkStudent').value;
            
            const students = JSON.parse(localStorage.getItem('students')) || [];
            const student = students.find(s => s.id == studentId);
            const t = translations[currentLang];
            
            const parentData = {
                id, name, phone, email, studentId,
                studentName: student ? student.name : t.unspecified
            };
            
            let parents = JSON.parse(localStorage.getItem('parents')) || [];
            const existingIndex = parents.findIndex(p => p.id == id);
            if (existingIndex > -1) {
                parents[existingIndex] = parentData;
            } else {
                parents.push(parentData);
            }
            
            localStorage.setItem('parents', JSON.stringify(parents));
            closeModal();
            loadParents();
            populateStudentDropdown();
        });
        
        function editParent(id) {
            const parents = JSON.parse(localStorage.getItem('parents')) || [];
            const parent = parents.find(p => p.id == id);
            if (!parent) return;
            
            document.getElementById('parentId').value = parent.id;
            document.getElementById('parentName').value = parent.name;
            document.getElementById('parentPhone').value = parent.phone;
            document.getElementById('parentEmail').value = parent.email || '';
            document.getElementById('linkStudent').value = parent.studentId || '';
            
            const t = translations[currentLang];
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> <span>' + t.editParent + '</span>';
            openModal();
        }
        
        function deleteParent(id) {
            const t = translations[currentLang];
            if (confirm(t.confirmDelete)) {
                let parents = JSON.parse(localStorage.getItem('parents')) || [];
                parents = parents.filter(p => p.id != id);
                localStorage.setItem('parents', JSON.stringify(parents));
                loadParents();
            }
        }
        
        function viewStudentRecord(studentId) {
            const t = translations[currentLang];
            if (studentId) {
                window.location.href = `student-record.html?studentId=${studentId}`;
            } else {
                alert(t.noStudentLinked);
            }
        }
        
        function filterParents() {
            const query = document.getElementById('parentSearch').value.toLowerCase();
            const classFilter = document.getElementById('filterClass').value;
            const cards = document.querySelectorAll('.parent-card');
            
            cards.forEach(card => {
                const name = card.querySelector('h4').textContent.toLowerCase();
                const student = card.querySelector('.linked-student span').textContent.toLowerCase();
                const matchSearch = name.includes(query) || student.includes(query);
                const matchClass = classFilter === '' || student.includes(classFilter);
                card.style.display = (matchSearch && matchClass) ? 'block' : 'none';
            });
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('parentModal');
            if (event.target == modal) closeModal();
        }
        
        function initTheme() {
            const themeBtn = document.getElementById('theme-toggle');
            if (themeBtn) {
                const savedTheme = localStorage.getItem('sama-theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                
                themeBtn.addEventListener('click', function() {
                    const current = document.documentElement.getAttribute('data-theme');
                    const next = current === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('sama-theme', next);
                    
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.className = next === 'light' ? 'fas fa-moon' : 'fas fa-sun';
                    }
                });
            }
        }
    </script>
</body>
</html>
